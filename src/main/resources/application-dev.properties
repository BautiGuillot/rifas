spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pescadoresArg}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

app.super-admin.username=${SUPER_ADMIN_USERNAME:superadmin}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:}
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}
app.comprobantes.storage=${COMPROBANTES_STORAGE:r2}
app.comprobantes.r2.endpoint=${R2_ENDPOINT:}
app.comprobantes.r2.bucket=${R2_BUCKET:}
app.comprobantes.r2.access-key=${R2_ACCESS_KEY:}
app.comprobantes.r2.secret-key=${R2_SECRET_KEY:}
app.comprobantes.r2.region=${R2_REGION:auto}
app.media.storage=${MEDIA_STORAGE:${COMPROBANTES_STORAGE:r2}}
app.media.public-base-url=${MEDIA_PUBLIC_BASE_URL:}
app.media.r2.endpoint=${R2_ENDPOINT:}
app.media.r2.bucket=${R2_BUCKET:}
app.media.r2.access-key=${R2_ACCESS_KEY:}
app.media.r2.secret-key=${R2_SECRET_KEY:}
app.media.r2.region=${R2_REGION:auto}
app.compras.expiracion-check-ms=${COMPRAS_EXPIRACION_CHECK_MS:30000}
