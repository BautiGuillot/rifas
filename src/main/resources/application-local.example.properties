spring.datasource.url=jdbc:postgresql://localhost:5433/rifas
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate

app.super-admin.username=superadmin
app.super-admin.password=
app.jwt.secret=
app.jwt.expiration-minutes=480
app.jwt.refresh-expiration-days=30

app.comprobantes.storage=r2
app.comprobantes.r2.endpoint=${R2_ENDPOINT:}
app.comprobantes.r2.bucket=${R2_BUCKET:}
app.comprobantes.r2.access-key=${R2_ACCESS_KEY:}
app.comprobantes.r2.secret-key=${R2_SECRET_KEY:}
app.comprobantes.r2.region=${R2_REGION:auto}

app.media.storage=r2
app.media.public-base-url=${MEDIA_PUBLIC_BASE_URL:}
app.media.r2.endpoint=${R2_ENDPOINT:}
app.media.r2.bucket=${R2_BUCKET:}
app.media.r2.access-key=${R2_ACCESS_KEY:}
app.media.r2.secret-key=${R2_SECRET_KEY:}
app.media.r2.region=${R2_REGION:auto}

app.compras.expiracion-check-ms=30000
