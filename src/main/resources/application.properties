spring.application.name=rifas-backend

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.super-admin.username=${SUPER_ADMIN_USERNAME:superadmin}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:}
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}
app.comprobantes.storage=local
app.comprobantes.path=uploads/comprobantes
app.media.storage=local
app.media.path=uploads/media
app.media.public-base-url=
app.compras.expiracion-check-ms=30000
app.twilio.enabled=${TWILIO_ENABLED:false}
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.webhook-base-url=${TWILIO_WEBHOOK_BASE_URL:}
app.twilio.validate-signature=${TWILIO_VALIDATE_SIGNATURE:false}

server.error.include-message=always

springdoc.swagger-ui.path=/swagger-ui.html
